# Publish sdist + wheel to PyPI using OpenID Connect (Trusted Publishing).
# Configure at https://pypi.org/manage/account/publishing/ for:
#   Owner: Pugsyfy
#   Repository: Slug-IG-Crawler
#   Workflow: publish-pypi.yml
#   Environment: (leave empty unless you use a GitHub Environment named on PyPI)

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata and packages
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
