# Canonical compose for local/manual runs. Orchestrators (e.g. Thor) use their own
# `docker compose -f …` path via DOCKER_COMPOSE_FILE; they typically run:
#   docker compose run --rm -v <workspace>:/job Slug-Ig-Crawler \
#     Slug-Ig-Crawler --config /job/config.toml
#
# Service name `Slug-Ig-Crawler` should stay aligned with integration defaults.
# Optional: `cp .env.example .env` and use `docker compose --env-file .env ...` for extra vars.

services:
  Slug-Ig-Crawler:
    build: .
    image: slug-ig-crawler:local
    shm_size: 2gb
    environment:
      PYTHONPATH: /app/src
      CHROME_BIN: /opt/chrome-linux64/chrome
      CHROMEDRIVER_BIN: /opt/chromedriver-linux64/chromedriver
    working_dir: /app
